<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joe Wei 九年级成绩趋势报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--text:#f1f5f9;--muted:#94a3b8;--blue:#3b82f6;--purple:#8b5cf6;--pink:#ec4899;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--gold:#eab308}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:24px}

.header{text-align:center;padding:36px 0 24px}
.header h1{font-size:1.9rem;font-weight:700;margin-bottom:6px}
.header .sub{color:var(--muted);font-size:.95rem}
.header .sub span{margin:0 6px}

.gpa-row{display:flex;gap:16px;justify-content:center;margin:28px 0 20px;flex-wrap:wrap}
.gpa-card{background:var(--card);border-radius:14px;padding:22px 32px;text-align:center;min-width:180px;border:1px solid var(--card2)}
.gpa-card .label{font-size:.82rem;color:var(--muted);margin-bottom:8px}
.gpa-card .value{font-size:2.4rem;font-weight:800}
.gpa-card .delta{font-size:.78rem;margin-top:4px}

/* GPA Bar Chart */
.gpa-bar-section{background:var(--card);border-radius:16px;padding:24px;margin-bottom:28px}
.gpa-bar-section h2{font-size:1.15rem;margin-bottom:16px}
.gpa-bar-chart{display:flex;align-items:flex-end;justify-content:center;gap:32px;height:240px;padding:0 20px}
.gpa-bar-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:140px}
.gpa-bar-item .bar-label{font-size:.82rem;color:var(--muted);white-space:nowrap}
.gpa-bar-item .bar-value{font-size:1.3rem;font-weight:800}
.gpa-bar-item .bar-delta{font-size:.72rem;font-weight:600}
.gpa-bar-item .bar-wrap{width:100%;height:160px;display:flex;align-items:flex-end;justify-content:center}
.gpa-bar-item .bar{width:72px;border-radius:10px 10px 0 0;transition:height .6s ease;position:relative;min-height:12px;box-shadow:0 0 20px rgba(255,255,255,.08)}
.gpa-bar-item .bar .bar-inner-val{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.82rem;font-weight:700}

.legend{display:flex;justify-content:center;gap:20px;margin:16px 0 28px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted)}
.legend-dot{width:12px;height:12px;border-radius:3px}

.section{background:var(--card);border-radius:16px;padding:24px;overflow-x:auto;margin-bottom:28px}
.section h2{font-size:1.15rem;margin-bottom:16px}

table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--card2);padding:10px 10px;text-align:center;font-weight:600;white-space:nowrap;font-size:.78rem}
th.left{text-align:left}
td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.05);white-space:nowrap;text-align:center;vertical-align:middle}
td.left{text-align:left}
tr:hover td{background:rgba(255,255,255,.02)}

.score-cell{display:flex;flex-direction:column;align-items:center;gap:2px}
.score-cell .val{font-weight:600;font-size:.88rem}
.score-cell .chg{font-size:.68rem;font-weight:600}
.score-bg-green{background:rgba(16,185,129,.1);border-radius:4px;padding:3px 8px}
.score-bg-red{background:rgba(239,68,68,.1);border-radius:4px;padding:3px 8px}
.score-bg-gold{background:rgba(234,179,8,.1);border-radius:4px;padding:3px 8px}
.score-bg-blue{background:rgba(59,130,246,.1);border-radius:4px;padding:3px 8px}
.chg-up{color:var(--green)}
.chg-down{color:var(--red)}

.mini-bars{display:flex;align-items:flex-end;gap:3px;height:32px}
.mini-bar{width:13px;border-radius:3px 3px 0 0;min-height:3px}

.grade{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-weight:700;font-size:.78rem}
.grade-a{background:rgba(16,185,129,.2);color:var(--green);border:2px solid var(--green)}
.grade-b{background:rgba(59,130,246,.2);color:var(--blue);border:2px solid var(--blue)}
.grade-c{background:rgba(245,158,11,.2);color:var(--amber);border:2px solid var(--amber)}

.change-up{color:var(--green);font-weight:600}
.change-down{color:var(--red);font-weight:600}

/* Dimension Analysis */
.dim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.dim-card{background:var(--card);border-radius:12px;padding:18px;border-left:4px solid var(--card2)}
.dim-card .name{font-size:.95rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dim-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.82rem}
.dim-row .dim-label{width:70px;color:var(--muted);text-align:right;flex-shrink:0}
.dim-row .dim-bar-wrap{flex:1;height:18px;background:rgba(255,255,255,.05);border-radius:4px;position:relative;overflow:hidden}
.dim-row .dim-bar{height:100%;border-radius:4px;transition:width .5s}
.dim-row .dim-val{width:40px;text-align:right;font-weight:600;flex-shrink:0}
.dim-row .dim-lost{width:70px;text-align:right;flex-shrink:0;font-size:.75rem}
.opportunity{margin-top:10px;padding:8px 12px;background:rgba(239,68,68,.08);border-radius:8px;font-size:.8rem;color:var(--amber);border:1px solid rgba(239,68,68,.15)}
.opportunity strong{color:var(--red)}

.findings{background:var(--card);border-radius:16px;padding:24px;margin-bottom:28px}
.findings h2{font-size:1.15rem;margin-bottom:16px}
.finding-item{padding:8px 0;font-size:.88rem;line-height:1.6;display:flex;align-items:flex-start;gap:8px}
.finding-item .icon{flex-shrink:0;font-size:1rem}
.finding-up{color:var(--green)}
.finding-down{color:var(--red)}

.hl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.hl-card{background:var(--card);border-radius:12px;padding:18px}
.hl-card h3{font-size:.92rem;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--card2)}
.hl-card .item{padding:5px 0;font-size:.84rem;line-height:1.5}
.hl-star{color:var(--green)}
.hl-warn{color:var(--amber)}
.hl-sug{color:var(--blue)}

footer{text-align:center;padding:30px 0 16px;color:var(--muted);font-size:.75rem}

@media(max-width:768px){
  .gpa-row{flex-direction:column;align-items:center}
  .dim-grid,.hl-grid{grid-template-columns:1fr}
  .gpa-card{min-width:140px;padding:16px 20px}
  .gpa-card .value{font-size:1.8rem}
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>Joe Wei 九年级成绩趋势报告</h1>
  <div class="sub">魏源 • Pre-2 • 2024-2025学年</div>
</div>

<div class="gpa-row" id="gpaCards"></div>
<div class="legend" id="legend"></div>

<div class="gpa-bar-section" id="gpaBarChart"></div>

<div class="section">
  <h2>📋 各科成绩趋势总览</h2>
  <table id="mainTable"></table>
</div>

<div class="section">
  <h2>🔍 四维度提分分析 <span style="font-size:.78rem;color:var(--muted);font-weight:400">（基础权重: 出勤15% + 课堂表现15% + 作业20% + 考试50%，无考试项时自动重分配权重）</span></h2>
  <div class="dim-grid" id="dimCards"></div>
</div>

<div class="findings" id="findings"></div>

<div class="section">
  <h2>💡 各学期关注要点</h2>
  <div class="hl-grid" id="hlCards"></div>
</div>

<footer>Joe Wei Academic Portfolio • 维护: 六六 (AI) • 每学期自动更新</footer>

</div>

<script src="data.js?v=20250621"></script>
<script>
// === Color palette (dynamic based on semester count) ===
const SEMESTER_COLORS = [
  {card:'var(--blue)',   bar:'#3b82f6', grad:'linear-gradient(to top, #2563eb, #60a5fa)', miniBg:'rgba(59,130,246,0.45)', miniBd:'rgba(59,130,246,0.85)'},
  {card:'var(--purple)', bar:'#8b5cf6', grad:'linear-gradient(to top, #7c3aed, #a78bfa)', miniBg:'rgba(139,92,246,0.45)', miniBd:'rgba(139,92,246,0.85)'},
  {card:'var(--pink)',   bar:'#ec4899', grad:'linear-gradient(to top, #db2777, #f472b6)', miniBg:'rgba(236,72,153,0.45)', miniBd:'rgba(236,72,153,0.85)'},
  {card:'var(--green)',  bar:'#10b981', grad:'linear-gradient(to top, #059669, #34d399)', miniBg:'rgba(16,185,129,0.45)', miniBd:'rgba(16,185,129,0.85)'},
  {card:'var(--amber)',  bar:'#f59e0b', grad:'linear-gradient(to top, #d97706, #fbbf24)', miniBg:'rgba(245,158,11,0.45)', miniBd:'rgba(245,158,11,0.85)'}
];

function getSemColor(i){
  return SEMESTER_COLORS[i % SEMESTER_COLORS.length];
}

// === GPA Cards ===
(function(){
  const el = document.getElementById('gpaCards');
  SEMESTERS.forEach((s,i)=>{
    const c = getSemColor(i);
    const prev = i>0 ? SEMESTERS[i-1].overall_gpa : null;
    const delta = prev!==null ? (s.overall_gpa - prev) : null;
    let deltaHtml = '';
    if(delta!==null){
      const cls = delta>=0?'chg-up':'chg-down';
      const arrow = delta>=0?'↑':'↓';
      deltaHtml = `<div class="delta ${cls}">${arrow} ${delta>=0?'+':''}${delta.toFixed(2)} vs ${SEMESTERS[i-1].label}</div>`;
    }
    el.innerHTML += `<div class="gpa-card"><div class="label">${s.label}</div><div class="value" style="color:${c.card}">${s.overall_gpa.toFixed(2)}</div>${deltaHtml}</div>`;
  });
})();

// === GPA Bar Chart ===
(function(){
  const el = document.getElementById('gpaBarChart');
  const minGpa = 3.2;
  let html = '<h2>📊 每半学期GPA总分趋势</h2><div class="gpa-bar-chart">';
  SEMESTERS.forEach((s,i)=>{
    const c = getSemColor(i);
    const barHeight = ((s.overall_gpa - minGpa) / (4.0 - minGpa)) * 150;
    const prev = i>0 ? SEMESTERS[i-1].overall_gpa : null;
    const delta = prev!==null ? (s.overall_gpa - prev) : null;
    let deltaHtml = '';
    if(delta!==null){
      const cls = delta>=0?'chg-up':'chg-down';
      const arrow = delta>=0?'↑':'↓';
      deltaHtml = `<div class="bar-delta ${cls}">${arrow}${delta>=0?'+':''}${delta.toFixed(2)} vs ${SEMESTERS[i-1].label}</div>`;
    }
    html += `<div class="gpa-bar-item">
      <div class="bar-value" style="color:${c.bar}">${s.overall_gpa.toFixed(2)}</div>
      ${deltaHtml}
      <div class="bar-wrap">
        <div class="bar" style="height:${barHeight}px;background:${c.grad}">
          <div class="bar-inner-val" style="color:${c.bar}"></div>
        </div>
      </div>
      <div class="bar-label">${s.label}</div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
})();

// === Legend ===
(function(){
  const el = document.getElementById('legend');
  SEMESTERS.forEach((s,i)=>{
    const c = getSemColor(i);
    el.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.bar}"></div>${s.label}</div>`;
  });
})();

function getGrade(gpa){ return gpa>=90?{label:'A',cls:'grade-a'}:gpa>=80?{label:'B',cls:'grade-b'}:gpa>=70?{label:'C',cls:'grade-c'}:{label:'D',cls:'grade-c'}; }
// 等级标准: A≥90, B≥80, C≥70, D<70
function scoreBgClass(val,prev){
  if(prev===null) return val>=90?'score-bg-gold':'score-bg-blue';
  const d=val-prev; return d>2?'score-bg-green':d<-2?'score-bg-red':'score-bg-blue';
}

// === Main Table ===
(function(){
  const table = document.getElementById('mainTable');
  let html = '<thead><tr><th class="left">科目</th>';
  SEMESTERS.forEach(s=> html += `<th>${s.shortLabel}</th>`);
  html += '<th>趋势图</th>';
  // Show all semester composite averages
  Object.keys(SEMESTER_COMPOSITE).forEach(k => {
    html += `<th>${SEMESTER_COMPOSITE[k].label}GPA</th>`;
  });
  html += '<th>整体变化</th><th>等级<span style="font-weight:400;font-size:.65rem;display:block;color:var(--muted)">A≥90 B≥80 C≥70</span></th></tr></thead><tbody>';
  
  SUBJECTS.forEach(sub=>{
    const vals = SEMESTERS.map(s=>s.scores[sub.id]?.gpa);
    const first = vals.find(v=>v!==null);
    const last = [...vals].reverse().find(v=>v!==null);
    const change = first!==null&&last!==null ? (last-first) : null;
    const isUp = change!==null && change>0;
    const isDown = change!==null && change<0;
    const grade = getGrade(last||0);
    
    html += `<tr><td class="left">${sub.icon} ${sub.name}</td>`;
    vals.forEach((v,i)=>{
      if(v===null){ html+='<td>—</td>'; return; }
      const prev = i>0 ? vals[i-1] : null;
      const delta = prev!==null ? (v-prev) : null;
      let chgHtml = '';
      if(delta!==null){
        const cls = delta>=0?'chg-up':'chg-down';
        const sign = delta>=0?'+':'';
        chgHtml = `<span class="chg ${cls}">${sign}${delta.toFixed(1)}</span>`;
      }
      const bgCls = scoreBgClass(v, prev);
      html += `<td><div class="score-cell ${bgCls}"><span class="val">${v}</span>${chgHtml}</div></td>`;
    });
    
    html += '<td><div class="mini-bars">';
    vals.forEach((v,i)=>{
      const c = getSemColor(i);
      if(v===null){ html+=`<div class="mini-bar" style="height:3px;background:${c.miniBg};border:1px solid ${c.miniBd};opacity:.3"></div>`; return; }
      const h = Math.max(4,((v-50)/50)*28);
      html += `<div class="mini-bar" style="height:${h}px;background:${c.miniBg};border:1.5px solid ${c.miniBd}"></div>`;
    });
    html += '</div></td>';
    
    // Show composite GPAs
    Object.keys(SEMESTER_COMPOSITE).forEach(k => {
      const compVal = SEMESTER_COMPOSITE[k].scores[sub.id];
      html += `<td style="font-weight:600">${compVal||'—'}</td>`;
    });
    
    if(change!==null){
      const cls = isUp?'change-up':'change-down';
      const arrow = isUp?'▲':'▼';
      html += `<td class="${cls}">${arrow} ${isUp?'+':''}${change.toFixed(1)}</td>`;
    } else html += '<td>—</td>';
    html += `<td><span class="grade ${grade.cls}">${grade.label}</span></td></tr>`;
  });
  html += '</tbody>';
  table.innerHTML = html;
})();

// === Four-Dimension Analysis ===
(function(){
  const el = document.getElementById('dimCards');
  const DIMS = [
    {key:'attendance',   label:'出勤',     baseWeight:0.15, color:'var(--blue)'},
    {key:'participation',label:'课堂表现', baseWeight:0.15, color:'var(--purple)'},
    {key:'homework',     label:'作业',     baseWeight:0.20, color:'var(--amber)'},
    {key:'exam',         label:'考试',     baseWeight:0.50, color:'var(--pink)'}
  ];
  
  // Use latest semester with full data
  const latestSem = SEMESTERS[SEMESTERS.length-1];
  
  SUBJECTS.forEach(sub=>{
    const scores = latestSem.scores[sub.id];
    if(!scores || scores.gpa===null) return;
    
    // Calculate redistributed weights for available dimensions
    const availableDims = DIMS.filter(d => scores[d.key] !== null);
    const totalBaseWeight = availableDims.reduce((sum, d) => sum + d.baseWeight, 0);
    const dims = DIMS.map(d => ({
      ...d,
      effectiveWeight: scores[d.key] !== null ? d.baseWeight / totalBaseWeight : 0,
      isAvailable: scores[d.key] !== null
    }));
    
    let cardHtml = `<div class="dim-card" style="border-left-color:${CATEGORIES[sub.category].color}">
      <div class="name">${sub.icon} ${sub.name} <span style="color:var(--muted);font-weight:400;font-size:.8rem">GPA ${scores.gpa} (${latestSem.label})</span></div>`;
    
    let maxLoss = 0;
    let maxLossDim = '';
    let maxLossVal = 0;
    
    dims.forEach(dim=>{
      if(!dim.isAvailable) {
        cardHtml += `<div class="dim-row"><span class="dim-label">${dim.label}</span><span style="color:var(--muted);font-size:.75rem">未进行</span></div>`;
        return;
      }
      const v = scores[dim.key];
      const lost = (100 - v) * dim.effectiveWeight;
      const pct = v;
      const barColor = v >= 95 ? 'var(--green)' : v >= 85 ? dim.color : 'var(--red)';
      const lostColor = lost > 3 ? 'var(--red)' : lost > 1.5 ? 'var(--amber)' : 'var(--green)';
      const weightPct = Math.round(dim.effectiveWeight * 100);
      
      if(lost > maxLoss){
        maxLoss = lost;
        maxLossDim = dim.label;
        maxLossVal = v;
      }
      
      cardHtml += `<div class="dim-row">
        <span class="dim-label">${dim.label} ${weightPct}%</span>
        <div class="dim-bar-wrap"><div class="dim-bar" style="width:${pct}%;background:${barColor}"></div></div>
        <span class="dim-val">${v}</span>
        <span class="dim-lost" style="color:${lostColor}">-${lost.toFixed(1)}分</span>
      </div>`;
    });
    
    // Opportunity insight
    const dailyDims = availableDims.filter(d => d.key !== 'exam' && scores[d.key] !== null && scores[d.key] < 95);
    const examDim = availableDims.filter(d => d.key === 'exam' && scores[d.key] !== null && scores[d.key] < 95);
    const dailyLost = dailyDims.reduce((s,d) => s + (100-scores[d.key]) * (d.baseWeight/totalBaseWeight), 0);
    const examLost = examDim.reduce((s,d) => s + (100-scores[d.key]) * (d.baseWeight/totalBaseWeight), 0);
    const hasExam = availableDims.some(d => d.key === 'exam' && scores[d.key] !== null);
    const totalLost = dailyLost + examLost;
    
    if(totalLost > 0.5){
      let insight = '🎯 ';
      if(hasExam && examLost > 0.5){
        if(dailyLost > examLost && dailyDims.length > 0){
          const dailyList = dailyDims.map(d => {
            const dimDef = DIMS.find(dd=>dd.key===d.key);
            return `${dimDef.label}${scores[d.key]}分`;
          }).join('+');
          const dailyPct = Math.round(dailyLost/totalLost*100);
          insight += `日常维度(${dailyList})合计扣${dailyLost.toFixed(1)}分(占${dailyPct}%) > 考试扣${examLost.toFixed(1)}分，<strong>课堂表现和作业是主要失分项</strong>`;
        } else {
          insight += `考试扣${examLost.toFixed(1)}分为最大失分项`;
          if(dailyLost > 0.5){
            insight += `，日常维度合计扣${dailyLost.toFixed(1)}分`;
          }
        }
      } else {
        const weakList = dailyDims.map(d => {
          const dimDef = DIMS.find(dd=>dd.key===d.key);
          const wl = (100-scores[d.key]) * (d.baseWeight/totalBaseWeight);
          return `${dimDef.label} ${scores[d.key]}分(扣${wl.toFixed(1)})`;
        }).join('、');
        insight += `主要失分项: <strong>${weakList}</strong>`;
      }
      const potGpa = (scores.gpa + totalLost).toFixed(1);
      insight += `，若提至满分GPA可达 <strong>${potGpa}</strong>`;
      cardHtml += `<div class="opportunity">${insight}</div>`;
    }
    
    cardHtml += '</div>';
    el.innerHTML += cardHtml;
  });
})();

// === Key Findings ===
(function(){
  const el = document.getElementById('findings');
  // Auto-generate key findings based on all semester data
  let items = [];
  
  // Find biggest improvements and declines
  SUBJECTS.forEach(sub=>{
    const vals = SEMESTERS.map(s=>s.scores[sub.id]?.gpa).filter(v=>v!==null);
    if(vals.length >= 2){
      const first = vals[0];
      const last = vals[vals.length-1];
      const change = last - first;
      if(change >= 4){
        items.push({up:true, text:`${sub.name}大幅进步：${first}→${last}，累计+${change.toFixed(1)}分`});
      } else if(change <= -3){
        items.push({up:false, text:`${sub.name}下滑：${first}→${last}，累计${change.toFixed(1)}分`});
      }
    }
  });
  
  // Find largest dimension losses in latest semester
  const DIMS2 = [
    {key:'attendance',   label:'出勤',     baseWeight:0.15},
    {key:'participation',label:'课堂表现', baseWeight:0.15},
    {key:'homework',     label:'作业',     baseWeight:0.20},
    {key:'exam',         label:'考试',     baseWeight:0.50}
  ];
  const latestSem = SEMESTERS[SEMESTERS.length-1];
  let allLosses = [];
  SUBJECTS.forEach(sub=>{
    const scores = latestSem.scores[sub.id];
    if(!scores) return;
    const availDims = DIMS2.filter(d => scores[d.key] !== null);
    const totalW = availDims.reduce((s,d)=>s+d.baseWeight,0);
    availDims.forEach(d=>{
      const v = scores[d.key];
      if(v < 85){
        allLosses.push({sub:sub.name, dim:d.label, val:v, loss:(100-v)*(d.baseWeight/totalW)});
      }
    });
  });
  allLosses.sort((a,b)=>b.loss-a.loss);
  allLosses.slice(0,5).forEach(l=>{
    items.push({up:false, text:`${l.sub}的${l.dim}${l.val}分是主要失分项（扣${l.loss.toFixed(1)}分）`});
  });
  
  // Add summary items
  const firstGpa = SEMESTERS[0].overall_gpa;
  const lastGpa = SEMESTERS[SEMESTERS.length-1].overall_gpa;
  items.unshift({up:lastGpa>=firstGpa, text:`整体GPA从${firstGpa.toFixed(2)}提升到${lastGpa.toFixed(2)}，${lastGpa>=firstGpa?'累计提升+'+(lastGpa-firstGpa).toFixed(2):'回落'+(firstGpa-lastGpa).toFixed(2)}`});
  
  let html = '<h2>🔑 关键发现与提分建议</h2>';
  items.forEach(it=>{
    const cls = it.up?'finding-up':'finding-down';
    const icon = it.up?'↑':'↓';
    html += `<div class="finding-item ${cls}"><span class="icon">${icon}</span><span>${it.text}</span></div>`;
  });
  el.innerHTML = html;
})();

// === Highlights Cards ===
(function(){
  const el = document.getElementById('hlCards');
  const semLabels = {};
  SEMESTERS.forEach(s => { semLabels[s.id] = s.label; });
  Object.entries(HIGHLIGHTS).forEach(([key,hl])=>{
    if(!hl.stars && !hl.warnings && !hl.suggestions) return;
    let card = `<div class="hl-card"><h3>📌 ${semLabels[key]||key}</h3>`;
    if(hl.stars) hl.stars.forEach(s=> card += `<div class="item hl-star">${s}</div>`);
    if(hl.warnings) hl.warnings.forEach(w=> card += `<div class="item hl-warn">${w}</div>`);
    if(hl.suggestions) hl.suggestions.forEach(g=> card += `<div class="item hl-sug">${g}</div>`);
    card += '</div>';
    el.innerHTML += card;
  });
})();
</script>
</body>
</html>
